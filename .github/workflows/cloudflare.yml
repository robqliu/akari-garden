name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy_web:
    name: Deploy web (Pages)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install
      - name: Build web
        run: pnpm --filter @akari-garden/web build

      # note: wrangler is installed by pnpm install above since it's a root devDependency
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          pnpm exec wrangler pages deploy web/dist \
            --project-name=akari-garden \
            --branch="$BRANCH_NAME" \
            --commit-dirty=true

  deploy_api:
    name: Deploy API (Workers)
    runs-on: ubuntu-latest
    # Main-only: this job deploys to a single named Worker
    # (`akari-garden-api`), so running on PRs would overwrite the
    # production Worker that the live site depends on. Per-PR preview
    # Workers would need a separate Worker name per PR — see
    # https://developers.cloudflare.com/workers/wrangler/environments/.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      # Disables the server for all deploys regardless of whether migrations
      # are pending. This means every deploy has a brief downtime window
      # (typically a few seconds). The tradeoff is simplicity — detecting
      # pending migrations reliably would require querying the d1_migrations
      # table and diffing against server/migrations/*.sql, since wrangler's
      # human-readable "Not Applied" output has no API stability guarantee.
      # For manual recovery steps see docs/operations.md.
      #
      # Blocks all incoming requests with 503 while schema and code are being
      # updated. Workers are stateless so CONFIG_KV is the only way to signal
      # across all running instances without a code deploy.
      - name: Disable server
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler kv key put --binding CONFIG_KV disable_server "1"

      - name: Apply D1 migrations
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply akari-garden-db --remote

      - name: Deploy Worker
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      # always() ensures this runs even if a previous step failed, so the
      # site is not left down after a broken migration or deploy.
      - name: Re-enable server
        if: always()
        working-directory: server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler kv key put --binding CONFIG_KV disable_server "0"
