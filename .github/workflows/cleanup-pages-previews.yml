name: Clean up Cloudflare Pages previews

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      CF_PROJECT: akari-garden
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Number of the canonical "cleanup is failing" tracker issue.
      # All cleanup failures append a comment to this issue (and
      # reopen it if it's closed). Leave at 0 to disable the tracker
      # — the workflow run will still go red on failure.
      TRACKER_ISSUE_NUMBER: 0
    steps:
      - name: Delete preview deployments for the closed PR's branch
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/deployments"
          page=1
          deleted=0
          while :; do
            resp=$(curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$api?page=$page&per_page=25")

            count=$(echo "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break

            # Filter: same branch, never production. We use
            # `?force=true` on delete because Cloudflare otherwise
            # refuses to remove the most recent deployment for an
            # alias — which is exactly what we want gone.
            ids=$(echo "$resp" | jq -r --arg b "$BRANCH_NAME" \
              '.result[]
                 | select(.environment != "production")
                 | select(.deployment_trigger.metadata.branch == $b)
                 | .id')

            for id in $ids; do
              echo "Deleting deployment $id (branch=$BRANCH_NAME)"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "$api/$id?force=true" >/dev/null
              deleted=$((deleted + 1))
            done

            [ "$count" -lt 25 ] && break
            page=$((page + 1))
          done
          echo "Deleted $deleted preview deployment(s) for branch '$BRANCH_NAME'"

      # Surface failures on the canonical tracker issue (number is
      # hardcoded above as TRACKER_ISSUE_NUMBER). Appends a comment
      # and reopens the issue if it was closed. Skipped if the
      # tracker number is left at 0 (the workflow run still goes red,
      # which is the primary signal).
      - name: Append failure to tracker issue
        if: ${{ failure() && env.TRACKER_ISSUE_NUMBER != '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt(process.env.TRACKER_ISSUE_NUMBER, 10);
            const branch = process.env.BRANCH_NAME;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `Cleanup failed for PR #${prNumber} (branch \`${branch}\`).\nFailed run: ${runUrl}`,
            });

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            if (issue.state === 'closed') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'open',
              });
            }
