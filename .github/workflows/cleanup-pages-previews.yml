name: Clean up Cloudflare Pages previews

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      CF_PROJECT: akari-garden
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Delete preview deployments for the closed PR's branch
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/deployments"
          page=1
          deleted=0
          while :; do
            resp=$(curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$api?page=$page&per_page=25")

            count=$(echo "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break

            # Filter: same branch, never production. We use
            # `?force=true` on delete because Cloudflare otherwise
            # refuses to remove the most recent deployment for an
            # alias — which is exactly what we want gone.
            ids=$(echo "$resp" | jq -r --arg b "$BRANCH_NAME" \
              '.result[]
                 | select(.environment != "production")
                 | select(.deployment_trigger.metadata.branch == $b)
                 | .id')

            for id in $ids; do
              echo "Deleting deployment $id (branch=$BRANCH_NAME)"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "$api/$id?force=true" >/dev/null
              deleted=$((deleted + 1))
            done

            [ "$count" -lt 25 ] && break
            page=$((page + 1))
          done
          echo "Deleted $deleted preview deployment(s) for branch '$BRANCH_NAME'"

      # Failure visibility without issue spam: keep exactly one issue
      # with the `cleanup-failure` label. First failure creates it;
      # subsequent failures append a comment (and reopen it if it was
      # closed). Close it once you've fixed the underlying problem —
      # if it breaks again, it'll be reopened with a fresh comment.
      - name: Record cleanup failure on the rolling tracker issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'cleanup-failure';

            const commentBody = [
              `Cleanup failed for PR #${prNumber} (branch \`${branch}\`).`,
              `Failed run: ${runUrl}`,
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: label,
              state: 'all',
              per_page: 1,
            });

            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody,
              });
              if (issue.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'open',
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Cloudflare Pages preview cleanup is failing',
                body: [
                  `The \`cleanup-pages-previews\` workflow has started failing.`,
                  ``,
                  commentBody,
                  ``,
                  `If this keeps failing, preview deployments will accumulate in the Cloudflare Pages dashboard.`,
                  `Likely causes: token lost \`Cloudflare Pages: Edit\` scope, Cloudflare API outage, or a breaking change to the deployments API response shape.`,
                  ``,
                  `Subsequent failures will be appended here as comments rather than spawning new issues. Close this when the underlying problem is fixed; it'll auto-reopen if it breaks again.`,
                ].join('\n'),
                labels: [label],
              });
            }
