name: Clean up Cloudflare Pages previews

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      CF_PROJECT: akari-garden
      BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Delete preview deployments for the closed PR's branch
        run: |
          set -euo pipefail
          api="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PROJECT/deployments"
          page=1
          deleted=0
          while :; do
            resp=$(curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              "$api?page=$page&per_page=25")

            count=$(echo "$resp" | jq '.result | length')
            [ "$count" -eq 0 ] && break

            # Filter: same branch, never production. We use
            # `?force=true` on delete because Cloudflare otherwise
            # refuses to remove the most recent deployment for an
            # alias — which is exactly what we want gone.
            ids=$(echo "$resp" | jq -r --arg b "$BRANCH_NAME" \
              '.result[]
                 | select(.environment != "production")
                 | select(.deployment_trigger.metadata.branch == $b)
                 | .id')

            for id in $ids; do
              echo "Deleting deployment $id (branch=$BRANCH_NAME)"
              curl -fsS -X DELETE \
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                "$api/$id?force=true" >/dev/null
              deleted=$((deleted + 1))
            done

            [ "$count" -lt 25 ] && break
            page=$((page + 1))
          done
          echo "Deleted $deleted preview deployment(s) for branch '$BRANCH_NAME'"

      # Surface failures loudly: the workflow run itself goes red, and
      # we also open an issue so it's visible without having to notice
      # the Actions tab. Filter by label `cleanup-failure` if these
      # become noisy.
      - name: Open issue on cleanup failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const prNumber = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Cloudflare Pages preview cleanup failed (PR #${prNumber}, branch ${branch})`,
              body: [
                `The \`cleanup-pages-previews\` workflow failed when PR #${prNumber} closed.`,
                `Branch: \`${branch}\``,
                `Failed run: ${runUrl}`,
                ``,
                `If this keeps failing, preview deployments will accumulate in the Cloudflare Pages dashboard.`,
                `Likely causes: token lost \`Cloudflare Pages: Edit\` scope, Cloudflare API outage, or a breaking change to the deployments API response shape.`,
              ].join('\n'),
              labels: ['cleanup-failure'],
            });
